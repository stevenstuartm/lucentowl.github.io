<script>
    // Redirect extensionless URLs to .html version (one attempt only)
    (function() {
        let path = window.location.pathname;

        // Skip if path already contains .html (already tried or valid)
        if (path.includes('.html')) {
            return;
        }

        // Handle trailing slash: remove it and add .html (but not for root "/")
        if (path.length > 1 && path.endsWith('/')) {
            path = path.slice(0, -1);
            window.location.replace(path + '.html' + window.location.search + window.location.hash);
            return;
        }

        // Only redirect if URL has no file extension at all
        if (!/\.[a-zA-Z0-9]+$/.test(path)) {
            window.location.replace(path + '.html' + window.location.search + window.location.hash);
        }
    })();
</script>

<div class="page">
    <div class="page-header">
        <h1>404 - Page Not Found</h1>
    </div>
    <div class="page-content">
        <p>Sorry, the page you're looking for doesn't exist.</p>
        <p><a href="{{ '/' | relative_url }}">Return to home page</a></p>
    </div>
</div>
