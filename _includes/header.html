<header class="site-header">
    <div class="container">
        <div class="header-content">
            <h1 class="site-title">
                <a href="{{ '/' | relative_url }}" aria-label="Lucent Owl - Home">
                    <img src="{{ '/assets/img/favicon-64x64.png' | relative_url }}" alt="Lucent Owl logo" class="site-icon">
                    <span class="site-name">Lucent Owl</span>
                </a>
            </h1>
            <button class="shelf-indicator" id="shelfIndicator" aria-label="Open shelf" aria-haspopup="dialog" aria-expanded="false">
                <svg class="shelf-indicator-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z"></path>
                </svg>
                <span class="shelf-badge" id="shelfBadge">0</span>
            </button>
            <button class="hamburger" aria-label="Toggle menu" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="header-right">
                <nav class="site-nav">
                    <a href="{{ '/blog.html' | relative_url }}">Blog</a>
                    <a href="{{ '/case-studies.html' | relative_url }}">Case Studies</a>
                    <a href="{{ '/study-guides.html' | relative_url }}">Study Guides</a>
                    <a href="{{ '/resources.html' | relative_url }}">Resources</a>
                    <a href="{{ '/tech-radar.html' | relative_url }}">Tech Radar</a>
                    <a href="{{ '/about.html' | relative_url }}">About</a>
                </nav>
            </div>
        </div>
    </div>
</header>

{% include shelf-panel.html %}

<script>
    (function() {
        const hamburger = document.querySelector('.hamburger');
        const headerRight = document.querySelector('.header-right');

        hamburger.addEventListener('click', function() {
            const isExpanded = this.getAttribute('aria-expanded') === 'true';
            this.setAttribute('aria-expanded', !isExpanded);
            this.classList.toggle('active');
            headerRight.classList.toggle('active');
        });

        // Close menu when clicking a nav link
        const navLinks = document.querySelectorAll('.site-nav a');
        navLinks.forEach(link => {
            link.addEventListener('click', function() {
                hamburger.classList.remove('active');
                headerRight.classList.remove('active');
                hamburger.setAttribute('aria-expanded', 'false');
            });
        });

        // Close menu when clicking outside
        document.addEventListener('click', function(event) {
            if (!event.target.closest('.header-content')) {
                hamburger.classList.remove('active');
                headerRight.classList.remove('active');
                hamburger.setAttribute('aria-expanded', 'false');
            }
        });
    })();
</script>
